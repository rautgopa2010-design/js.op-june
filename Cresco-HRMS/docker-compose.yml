version: '3.8'

services:
  mysql:
    image: mysql:8.0
    container_name: cresco_hrms_db
    environment:
      MYSQL_ROOT_PASSWORD: root_password
      MYSQL_DATABASE: cresco_hrms
      MYSQL_USER: hrms_user
      MYSQL_PASSWORD: hrms_password
    ports:
      - '3306:3306'
    volumes:
      - mysql_data:/var/lib/mysql
      - ./database/schema.sql:/docker-entrypoint-initdb.d/schema.sql
    networks:
      - cresco-network
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      timeout: 20s
      retries: 10

  phpmyadmin:
    image: phpmyadmin:latest
    container_name: cresco_phpmyadmin
    environment:
      PMA_HOST: mysql
      PMA_USER: root
      PMA_PASSWORD: root_password
    ports:
      - '8080:80'
    depends_on:
      - mysql
    networks:
      - cresco-network

volumes:
  mysql_data:

networks:
  cresco-network:
    driver: bridge
